import org.gradle.api.GradleException

pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'com.android.application' version '8.1.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
}

include ':app'

// Read local properties to find the Flutter SDK path
def localProperties = new Properties()
def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty("flutter.sdk")
if (flutterSdkPath == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

// Include the Flutter tools build logic from the SDK path
includeBuild(new File(flutterSdkPath, 'packages/flutter_tools/gradle'))

// Apply the Flutter plugin loader
apply from: new File(flutterSdkPath, 'packages/flutter_tools/gradle/app_plugin_loader.gradle')