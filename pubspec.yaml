name: emergency_resource_locator
description: Emergency Resource Locator - Find nearest hospitals, police, and ambulances
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI and Material Design
  cupertino_icons: ^1.0.6
  
  # Map functionality with OpenStreetMap
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  
  # Location Services
  geolocator: ^14.0.2

  # Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2

  # HTTP requests
  http: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true